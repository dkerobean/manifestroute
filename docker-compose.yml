name: manifestroute

services:
  manifest:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - PORT=2099
      - BIND_ADDRESS=0.0.0.0
      - DATABASE_URL=postgresql://manifest:manifest@postgres:5432/manifest
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-9b1e4f8d2c6a0e7f5b3d9c1a8e4f2b6d7c9a5e3f1b8d2c4a6e0f7b5d3c1a9e8f}
      - MANIFEST_MODE=selfhosted
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const p=process.env.PORT||'2099';fetch(`http://127.0.0.1:${p}/api/v1/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    networks:
      - internal
      - frontend

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=manifest
      - POSTGRES_PASSWORD=manifest
      - POSTGRES_DB=manifest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U manifest
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  pgdata:
    name: manifest_pgdata
